version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: blinko-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=blinko_backend
    volumes:
      - postgres_data:/var/lib/postgresql/data

  frontend:
    build: ./frontend
    container_name: blinko-frontend
    volumes:
      - frontend_dist:/app/share
    restart: always

  backend:
    build: ./backend
    container_name: blinko-backend
    env_file:
      - ./backend/.env
    restart: always
    depends_on:
      - postgres-db

  media-core:
    build: ./media-core
    container_name: blinko-media-core
    ports:
      - "49152-65535:49152-65535/udp"
    restart: always

  caddy:
    image: caddy:2-alpine
    container_name: caddy-server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - frontend_dist:/var/www/html:ro
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: always
    depends_on:
      - frontend
      - backend
      - media-core

volumes:
  postgres_data:
  frontend_dist:
  caddy_data:
  caddy_config:
