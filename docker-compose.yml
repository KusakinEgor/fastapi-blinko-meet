version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    restart: always
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - MEDIASERVER_URL=http://media-core:8888
    restart: always
    depends_on:
      - media-core

  media-core:
    build: ./media-core
    network_mode: "host"
    restart: always
